<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d2535"/><stop offset="1" stop-color="#13202e"/>
    </linearGradient>
    <linearGradient id="usb" x1="120" y1="70" x2="300" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00aaff"/><stop offset="1" stop-color="#7d5cff"/>
    </linearGradient>
  </defs>

  <!-- panel background -->
  <rect width="400" height="200" fill="url(#bg)"/>

  <!-- background "copy" sign: two overlapping pages, faded -->
  <g opacity="0.13" stroke="#7fd4ff" stroke-width="6" fill="none">
    <rect x="208" y="34" width="96" height="120" rx="10"/>
    <rect x="244" y="58" width="96" height="120" rx="10" fill="#7fd4ff" fill-opacity="0.06"/>
  </g>

  <!-- USB flash drive, foreground, centered-ish -->
  <g transform="translate(70,78) rotate(-8)">
    <!-- metal connector -->
    <rect x="-8" y="6" width="34" height="34" rx="3" fill="#c9d3e0"/>
    <rect x="-2" y="12" width="9" height="9" fill="#8a93a3"/>
    <rect x="12" y="12" width="9" height="9" fill="#8a93a3"/>
    <!-- neck -->
    <rect x="24" y="10" width="10" height="26" fill="#9aa5b5"/>
    <!-- body -->
    <rect x="32" y="2" width="150" height="42" rx="10" fill="url(#usb)"/>
    <!-- cap line + indicator -->
    <rect x="150" y="2" width="32" height="42" rx="10" fill="#ffffff" fill-opacity="0.18"/>
    <circle cx="60" cy="23" r="5" fill="#ffffff" fill-opacity="0.85"/>
  </g>

  <!-- small copy arrows hinting auto-copy -->
  <g transform="translate(300,150)" fill="#00d18f">
    <path d="M0 0 l10 0 l0 -6 l12 11 l-12 11 l0 -6 l-10 0 z" opacity="0.9"/>
  </g>
</svg>
