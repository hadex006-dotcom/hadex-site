<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="400" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d2535"/><stop offset="1" stop-color="#13202e"/>
    </linearGradient>
    <linearGradient id="charge" x1="0" y1="0" x2="0" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3cd673"/><stop offset="1" stop-color="#22a85a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#ffd86b" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffd86b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="200" fill="url(#bbg)"/>

  <!-- background faded battery outline (the "sign" effect) -->
  <g opacity="0.12" stroke="#7fd4ff" stroke-width="6" fill="none">
    <rect x="232" y="60" width="120" height="74" rx="12"/>
    <rect x="354" y="84" width="12" height="26" rx="3" fill="#7fd4ff"/>
  </g>

  <!-- glow behind the lamp -->
  <circle cx="120" cy="70" r="64" fill="url(#glow)"/>

  <!-- lamp: bulb -->
  <g transform="translate(120,66)">
    <path d="M0 -34 a30 30 0 0 1 18 54 q-4 4 -4 10 l-28 0 q0 -6 -4 -10 a30 30 0 0 1 18 -54 z" fill="#ffd86b"/>
    <rect x="-12" y="30" width="24" height="9" rx="2" fill="#c9d3e0"/>
    <rect x="-9" y="39" width="18" height="6" rx="2" fill="#9aa5b5"/>
    <!-- filament hint -->
    <path d="M-6 4 l6 8 l6 -8" stroke="#b8860b" stroke-width="2.5" fill="none"/>
  </g>

  <!-- foreground battery, prominent -->
  <g transform="translate(196,108)">
    <rect x="0" y="0" width="150" height="64" rx="12" fill="#262b38" stroke="#c9d3e0" stroke-width="5"/>
    <rect x="150" y="20" width="14" height="24" rx="3" fill="#c9d3e0"/>
    <!-- charge level (low, to match a reminder) -->
    <rect x="10" y="10" width="40" height="44" rx="6" fill="url(#charge)"/>
    <!-- bolt -->
    <path d="M92 8 L72 38 H86 L82 56 L104 30 H90 L92 8 Z" fill="#ffd86b"/>
  </g>
</svg>
